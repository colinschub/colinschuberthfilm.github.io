<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colin Schuberth | Filmmaker & Director</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#fff;
    color:#000;
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
}

/* TOP HALFTONE */

.hero{
    position:relative;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    overflow:hidden;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    radial-gradient(
        circle at center,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0) 20%,
        rgba(255,255,255,.15) 21%
    );

    background-image:
    radial-gradient(circle, transparent 0%, transparent 25%, black 26%);

    background-size:22px 22px;

    opacity:.95;

    mask-image:
    linear-gradient(
        to bottom,
        black 0%,
        black 20%,
        rgba(0,0,0,.8) 35%,
        rgba(0,0,0,.4) 50%,
        transparent 80%
    );

.hero-content{
    position:relative;
    z-index:2;
}

.hero h1{
    font-family:'Oswald',sans-serif;
    font-size:clamp(5rem,12vw,10rem);
    line-height:.9;
    text-transform:uppercase;
}

.subtitle{
    margin-top:25px;
    font-family:'Oswald',sans-serif;
    letter-spacing:4px;
    font-size:1.3rem;
}

section{
    max-width:1200px;
    margin:auto;
    padding:100px 40px;
}

h2{
    font-family:'Oswald',sans-serif;
    font-size:4rem;
    text-transform:uppercase;
    margin-bottom:40px;
    line-height:1;
}

.about-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:60px;
}

.about-text{
    font-size:1.2rem;
    line-height:1.8;
}

.about-image{
    min-height:350px;

    background:
    radial-gradient(circle,
      black 25%,
      transparent 26%)
      0 0/8px 8px;

    border:3px solid black;
}

.video-wrapper{
    border:3px solid black;
    margin-bottom:50px;
    box-shadow:12px 12px 0px black;
    background:white;
}

.video-wrapper iframe{
    display:block;
    width:100%;
    aspect-ratio:16/9;
}

.button{
    display:inline-block;
    margin-top:40px;
    padding:18px 40px;
    border:2px solid black;
    color:black;
    text-decoration:none;
    text-transform:uppercase;
    letter-spacing:2px;
    font-weight:600;
}

/* BOTTOM HALFTONE */

footer{
    position:relative;
    color:white;
    background:black;
    text-align:center;
    padding:120px 20px 80px;
    overflow:hidden;
}

footer::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    radial-gradient(circle,
      white 22%,
      transparent 24%)
      0 0/14px 14px;

    opacity:.85;

    mask-image:
      linear-gradient(
      to bottom,
      transparent 0%,
      black 35%,
      black 100%);
}

footer>*{
    position:relative;
    z-index:2;
}

.contact{
    font-size:1.2rem;
    margin:20px 0;
}

@media(max-width:800px){

    .about-grid{
        grid-template-columns:1fr;
    }

    h2{
        font-size:3rem;
    }

    .hero h1{
        font-size:5rem;
    }
}

</style>
</head>

<body>

<header class="hero">

<div class="hero-content">

<h1>
COLIN<br>
SCHUBERTH
</h1>

<p class="subtitle">
FILMMAKER & DIRECTOR
</p>

</div>

</header>

<section>

<h2>About</h2>

<div class="about-grid">

<div class="about-text">
<p>
I create short films, documentaries and feature films.
My work focuses on strong performances, musical 
integration and enjoyable and sustainable sets.
</p>
</div>

<div class="about-image"></div>

</div>

</section>

<section>

<h2>Featured Work</h2>

<div class="video-wrapper" style="margin-bottom:50px;">
<iframe
src="https://www.youtube.com/embed/ZW1_LI3Ajjg"
allowfullscreen>
</iframe>
</div>

<div class="video-wrapper" style="margin-bottom:50px;">

</iframe>
</div>

</div>

<div class="video-wrapper">

src="https://www.youtube.com/embed/EJyw_8gn5ek"
allowfullscreen>

</div>

</section>

<h2>Contact</h2>

<div class="contact">

</div>

</div>

</footer>

</body>
</html>
