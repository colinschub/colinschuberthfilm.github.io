<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cinematic Webflow MVP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Inter;
    display:flex;
    height:100vh;
    overflow:hidden;
    background:#fff;
    color:#000;
}

/* ================= SIDEBAR ================= */
#panel{
    width:260px;
    background:#111;
    color:#fff;
    padding:12px;
    overflow:auto;
}

#panel h2{
    font-family:Oswald;
    font-size:18px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:10px;
    margin:5px 0;
    cursor:pointer;
    font-weight:bold;
}

/* ================= CANVAS ================= */
#canvas{
    flex:1;
    overflow:auto;
    padding:40px;
}

/* ================= SECTIONS ================= */
.section{
    border:1px dashed rgba(0,0,0,0.2);
    padding:60px;
    margin-bottom:30px;
    position:relative;
}

.section:hover{
    border-color:#000;
}

.section[draggable="true"]{
    cursor:grab;
}

/* ================= TYPOGRAPHY ================= */
.hero-title{
    font-family:Oswald;
    font-size:90px;
    line-height:0.9;
    cursor:text;
}

.subtitle{
    font-family:Oswald;
    letter-spacing:3px;
    margin-top:10px;
    cursor:text;
}

.section-title{
    font-family:Oswald;
    font-size:36px;
    margin-bottom:20px;
    cursor:text;
}

.text{
    font-size:16px;
    line-height:1.7;
    max-width:70ch;
    cursor:text;
}

/* ================= ABOUT ================= */
.about{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
    align-items:center;
}

.about img{
    width:100%;
    border:3px solid #000;
    filter:grayscale(1);
    cursor:pointer;
}

/* ================= VIDEO ================= */
.video iframe{
    width:100%;
    aspect-ratio:16/9;
    border:3px solid #000;
}

/* ================= EDITABLE ================= */
[contenteditable="true"]{
    outline:1px dashed rgba(0,0,0,0.3);
}

/* ================= CONTROL PANEL RIGHT STYLE ================= */
#stylePanel{
    position:fixed;
    right:20px;
    top:20px;
    width:220px;
    background:#000;
    color:#fff;
    padding:12px;
    font-size:12px;
}

#stylePanel input{
    width:100%;
    margin-top:5px;
}

/* ================= ADD BUTTON ================= */
.add{
    margin-bottom:20px;
    border:2px solid #000;
    padding:10px;
    font-family:Oswald;
    cursor:pointer;
    background:#fff;
}

/* ================= DELETE ================= */
.del{
    position:absolute;
    top:10px;
    right:10px;
    background:#000;
    color:#fff;
    font-size:12px;
    padding:4px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- ================= PANEL ================= -->
<div id="panel">
    <h2>WEBFLOW MVP</h2>

    <button onclick="addSection()">+ Add Section</button>
    <button onclick="save()">Save</button>
    <button onclick="load()">Load</button>
    <button onclick="reset()">Reset</button>
</div>

<!-- ================= CANVAS ================= -->
<div id="canvas">

    <div class="section" draggable="true">
        <div class="del" onclick="this.parentElement.remove()">X</div>

        <div class="hero-title" contenteditable="true">
            COLIN SCHUBERTH
        </div>

        <div class="subtitle" contenteditable="true">
            FILMMAKER & DIRECTOR
        </div>
    </div>

    <div class="section" draggable="true">
        <div class="del" onclick="this.parentElement.remove()">X</div>

        <div class="section-title" contenteditable="true">ABOUT</div>

        <div class="about">
            <div class="text" contenteditable="true">
                I create cinematic short films focused on emotion, performance, and story.
            </div>

            <img src="https://picsum.photos/600/400" onclick="changeImage(this)">
        </div>
    </div>

    <div class="section" draggable="true">
        <div class="del" onclick="this.parentElement.remove()">X</div>

        <div class="section-title" contenteditable="true">WORK</div>

        <div class="video">
            <iframe src="https://www.youtube.com/embed/esY0ptwivYE"></iframe>
        </div>
    </div>

</div>

<!-- ================= STYLE PANEL ================= -->
<div id="stylePanel">
    <h3 style="font-family:Oswald;">STYLE</h3>

    <label>Font Size</label>
    <input type="range" min="12" max="28"
        oninput="document.querySelectorAll('.text').forEach(t=>t.style.fontSize=this.value+'px')">

    <label>Section Padding</label>
    <input type="range" min="30" max="120"
        oninput="document.querySelectorAll('.section').forEach(s=>s.style.padding=this.value+'px')">
</div>

<script>

/* ================= DRAG ================= */
let dragged;

document.querySelectorAll('.section').forEach(el=>{
    el.addEventListener('dragstart', ()=> dragged = el);
    el.addEventListener('dragover', e=> e.preventDefault());
    el.addEventListener('drop', ()=>{
        if(dragged && dragged!==el){
            el.parentNode.insertBefore(dragged, el);
        }
    });
});

/* ================= ADD SECTION ================= */
function addSection(){
    const div = document.createElement("div");
    div.className = "section";
    div.draggable = true;

    div.innerHTML = `
        <div class="del" onclick="this.parentElement.remove()">X</div>
        <div class="section-title" contenteditable="true">New Section</div>
        <div class="text" contenteditable="true">Edit content...</div>
    `;

    enableDrag(div);
    document.getElementById("canvas").appendChild(div);
}

function enableDrag(el){
    el.addEventListener('dragstart', ()=> dragged = el);
    el.addEventListener('dragover', e=> e.preventDefault());
    el.addEventListener('drop', ()=>{
        if(dragged && dragged!==el){
            el.parentNode.insertBefore(dragged, el);
        }
    });
}

/* ================= IMAGE ================= */
function changeImage(img){
    const url = prompt("Image URL:");
    if(url) img.src = url;
}

/* ================= SAVE / LOAD ================= */
function save(){
    localStorage.setItem("cinematic_mvp", document.getElementById("canvas").innerHTML);
    alert("Saved");
}

function load(){
    const data = localStorage.getItem("cinematic_mvp");
    if(data){
        document.getElementById("canvas").innerHTML = data;

        document.querySelectorAll('.section').forEach(enableDrag);
    }
}

function reset(){
    localStorage.removeItem("cinematic_mvp");
    location.reload();
}

/* ================= AUTO LOAD ================= */
window.onload = ()=> load();

</script>

</body>
</html>
